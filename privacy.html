<h1>سياسة الخصوصية</h1>

<p>نحن نحترم خصوصية عملائنا ونلتزم بحماية بياناتهم.</p>

<h3>المعلومات التي نجمعها:</h3>
<ul>
<li>الاسم</li>
<li>رقم الهاتف</li>
<li>العنوان</li>
</ul>

<h3>كيف نستخدم المعلومات:</h3>
<p>نستخدم البيانات فقط لتوصيل الطلب والتواصل مع العميل.</p>

<h3>حماية المعلومات:</h3>
<p>لا نقوم بمشاركة بياناتك مع أي جهة خارجية إلا لغرض التوصيل.</p>
